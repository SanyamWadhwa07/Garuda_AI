<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="GarudaAI - Local AI Agent Platform">
    <meta name="theme-color" content="#0d0d0d">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GarudaAI">
    <meta name="mobile-web-app-capable" content="yes">

    <title>GarudaAI</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦅</text></svg>">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <!-- Login overlay -->
    <div id="login-overlay" class="login-overlay" style="display:none;">
        <div class="login-box">
            <h2>🦅 GarudaAI</h2>
            <p>Enter password to continue</p>
            <input type="password" id="login-password" placeholder="Password"
                   autocomplete="current-password" autocorrect="off">
            <button id="login-btn" class="btn-primary">Login</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>

    <!-- Sidebar backdrop (mobile) -->
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <div id="app" class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button id="sidebar-toggle-btn" class="btn-icon sidebar-toggle" title="Menu">☰</button>
                <h1>🦅 GarudaAI</h1>
            </div>
            <div class="header-right">
                <span id="slow-mode-badge" class="slow-mode-badge" style="display:none;"
                      title="Layer offloading — responses take 1-3 min">⚠ Slow</span>
                <span id="conn-status" class="conn-status conn-ok" title="Connection status">●</span>
                <button id="settings-btn" class="btn-icon" title="Settings">⚙️</button>
            </div>
        </header>

        <!-- Model selector row -->
        <div class="model-bar">
            <select id="model-selector" class="model-selector">
                <option value="">Loading models...</option>
            </select>
            <button id="voice-btn" class="btn-icon" title="Voice input">🎤</button>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="column-messages">
                <!-- Messages Area -->
                <div id="messages" class="messages-container"></div>

                <!-- Input Area -->
                <div class="input-area">
                    <!-- Image preview (shown when photo attached) -->
                    <div id="image-preview-area" class="image-preview-area" style="display:none;">
                        <img id="preview-img" alt="Attached image">
                        <button id="remove-img-btn" class="remove-img-btn" title="Remove image">✕</button>
                    </div>

                    <!-- Pill-shaped input wrap -->
                    <div class="input-wrap">
                        <textarea
                            id="message-input"
                            class="message-input"
                            placeholder="Ask me anything..."
                            rows="1"
                            enterkeyhint="send"
                            autocorrect="off"
                            autocapitalize="sentences"></textarea>
                        <div class="input-actions">
                            <button id="camera-btn" class="btn-input-icon" title="Attach photo">📷</button>
                            <button id="send-btn" class="btn-send" title="Send">
                                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                                    <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <span>🦅 GarudaAI</span>
                    <button id="sidebar-close-btn" class="btn-icon">✕</button>
                </div>
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="history">💬 History</button>
                    <button class="tab-btn" data-tab="settings">⚙️ Settings</button>
                </div>

                <!-- Session History -->
                <div id="history-tab" class="tab-content active">
                    <div class="history-container">
                        <button id="new-session-btn" class="btn-small">+ New Chat</button>
                        <div id="history-list" class="history-list"></div>
                        <div class="history-footer">
                            <button id="export-btn" class="btn-small">⬇ Export MD</button>
                        </div>
                    </div>
                </div>

                <!-- Settings -->
                <div id="settings-tab" class="tab-content">
                    <div class="settings-container">

                        <!-- Persona -->
                        <div class="settings-section">
                            <h3>🧠 Persona (SOUL.md)</h3>
                            <div class="setting">
                                <textarea id="soul-textarea" placeholder="Describe your AI's personality, your preferences, and facts to remember..."></textarea>
                                <button id="soul-save-btn" class="btn-small">Save Persona</button>
                            </div>
                        </div>

                        <hr class="settings-divider">

                        <!-- Documents (RAG) -->
                        <div class="settings-section">
                            <h3>📚 Documents (RAG)</h3>
                            <div class="setting">
                                <label class="btn-small" for="rag-file-input" style="cursor:pointer; text-align:center;">
                                    ＋ Upload file
                                </label>
                                <input type="file" id="rag-file-input" accept=".pdf,.txt,.md,.py,.js,.ts,.json,.csv" style="display:none;">
                                <div id="rag-status" style="font-size:0.8rem; color:var(--text-muted);"></div>
                                <div id="rag-doc-list" class="rag-doc-list"></div>
                            </div>
                        </div>

                        <hr class="settings-divider">

                        <!-- Voice -->
                        <div class="settings-section">
                            <h3>🎤 Voice</h3>
                            <div class="setting">
                                <label>
                                    <input type="checkbox" id="voice-toggle" checked>
                                    Enable voice input
                                </label>
                                <label>
                                    <input type="checkbox" id="tts-toggle">
                                    Read responses aloud (TTS)
                                </label>
                            </div>
                        </div>

                        <hr class="settings-divider">

                        <!-- General -->
                        <div class="settings-section">
                            <h3>⚙️ General</h3>
                            <div class="setting">
                                <label for="history-limit">Keep last:</label>
                                <input type="number" id="history-limit" min="1" max="100" value="50">
                                <span style="font-size:0.8rem; color:var(--text-muted);">messages per session</span>
                            </div>
                        </div>

                        <hr class="settings-divider">

                        <!-- Security -->
                        <div class="settings-section">
                            <h3>🔒 Security</h3>
                            <div class="setting">
                                <input type="password" id="password-input" placeholder="New password"
                                       autocomplete="new-password">
                                <button id="password-btn" class="btn-small">Update Password</button>
                            </div>
                            <button id="reset-btn" class="btn-small danger">Reset All Settings</button>
                        </div>

                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="/marked.min.js"></script>
    <script src="/purify.min.js"></script>
    <script src="/sw-register.js"></script>
    <script src="/script.js"></script>
</body>
</html>
